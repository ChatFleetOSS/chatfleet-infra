name: Infra CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read
  packages: read

jobs:
  validate-stable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate stable image references
        run: |
          eval "$(CHANNEL=stable bash ./scripts/resolve-channel.sh)"
          python3 ./scripts/promote_channel.py \
            --channel stable \
            --api-tag "${API_TAG}" \
            --web-tag "${WEB_TAG}" \
            --verify-only
      - name: Exercise promotion flow across three versions
        run: python3 ./scripts/test_promotion_flow.py

  smoke-stable:
    runs-on: ubuntu-latest
    needs: validate-stable
    steps:
      - uses: actions/checkout@v4
      - name: Resolve stable channel
        run: |
          eval "$(CHANNEL=stable bash ./scripts/resolve-channel.sh)"
          echo "API_TAG=${API_TAG}" >> "$GITHUB_ENV"
          echo "WEB_TAG=${WEB_TAG}" >> "$GITHUB_ENV"
      - name: Install stack from current checkout
        run: |
          set -euo pipefail
          INSTALL_DIR="$RUNNER_TEMP/chatfleet-infra" \
          INFRA_SOURCE_DIR="$GITHUB_WORKSPACE" \
          CHANNEL=stable \
          CREATE_ADMIN=1 \
          ADMIN_EMAIL=admin@example.com \
          bash ./install.sh
      - name: Verify running versions
        run: |
          python3 "$RUNNER_TEMP/chatfleet-infra/scripts/verify_stack.py" \
            --base-url http://localhost:8080 \
            --expected-api "$API_TAG" \
            --expected-web "$WEB_TAG"
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f "$RUNNER_TEMP/chatfleet-infra/docker-compose.yml" logs --tail=200
      - name: Cleanup
        if: always()
        run: docker compose -f "$RUNNER_TEMP/chatfleet-infra/docker-compose.yml" down -v || true

  validate-edge:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate edge image references
        run: |
          eval "$(CHANNEL=edge bash ./scripts/resolve-channel.sh)"
          python3 ./scripts/promote_channel.py \
            --channel edge \
            --api-tag "${API_TAG}" \
            --web-tag "${WEB_TAG}" \
            --verify-only

  smoke-edge:
    runs-on: ubuntu-latest
    needs: validate-edge
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Resolve edge channel
        run: |
          eval "$(CHANNEL=edge bash ./scripts/resolve-channel.sh)"
          echo "API_TAG=${API_TAG}" >> "$GITHUB_ENV"
          echo "WEB_TAG=${WEB_TAG}" >> "$GITHUB_ENV"
      - name: Install stack from current checkout
        run: |
          set -euo pipefail
          INSTALL_DIR="$RUNNER_TEMP/chatfleet-infra-edge" \
          INFRA_SOURCE_DIR="$GITHUB_WORKSPACE" \
          CHANNEL=edge \
          bash ./install.sh
      - name: Verify running versions
        run: |
          python3 "$RUNNER_TEMP/chatfleet-infra-edge/scripts/verify_stack.py" \
            --base-url http://localhost:8080 \
            --expected-api-prefix sha- \
            --expected-web-prefix sha-
      - name: Dump logs on failure
        if: failure()
        run: docker compose -f "$RUNNER_TEMP/chatfleet-infra-edge/docker-compose.yml" logs --tail=200
      - name: Cleanup
        if: always()
        run: docker compose -f "$RUNNER_TEMP/chatfleet-infra-edge/docker-compose.yml" down -v || true
