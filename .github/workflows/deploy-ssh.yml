name: Deploy (SSH)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: deployment channel (stable or edge)
        default: stable
        required: true
      api_tag:
        description: chatfleet-api tag (e.g. v1.2.3)
        required: false
      web_tag:
        description: chatfleet-web tag (e.g. v1.2.3)
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 30m
          envs: GHCR_PAT,GHCR_USERNAME
          script: |
            set -euo pipefail
            CHANNEL="${{ github.event.inputs.channel }}"
            API_TAG="${{ github.event.inputs.api_tag }}"
            WEB_TAG="${{ github.event.inputs.web_tag }}"

            cd /opt/chatfleet-infra
            git pull --ff-only || true

            eval "$(
              CHANNEL="$CHANNEL" \
              API_TAG="$API_TAG" \
              WEB_TAG="$WEB_TAG" \
              bash ./scripts/resolve-channel.sh
            )"

            IM_API="ghcr.io/chatfleetoss/chatfleet-api:${API_TAG}"
            IM_WEB="ghcr.io/chatfleetoss/chatfleet-web:${WEB_TAG}"

            echo "$GHCR_PAT" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            cosign verify \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp "https://github.com/ChatFleetOSS/.+" \
              "$IM_API"

            cosign verify \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp "https://github.com/ChatFleetOSS/.+" \
              "$IM_WEB"

            CHANNEL="$CHATFLEET_CHANNEL" API_TAG="$API_TAG" WEB_TAG="$WEB_TAG" ./upgrade.sh /opt/chatfleet-infra
            python3 ./scripts/verify_stack.py \
              --base-url http://localhost:8080 \
              --expected-api "$API_TAG" \
              --expected-web "$WEB_TAG"
