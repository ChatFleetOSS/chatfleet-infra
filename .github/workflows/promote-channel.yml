name: Promote Channel

on:
  workflow_dispatch:
    inputs:
      channel:
        description: channel to update
        required: true
        default: stable
      api_tag:
        description: chatfleet-api tag to promote
        required: true
      web_tag:
        description: chatfleet-web tag to promote
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update channel file
        run: |
          python3 ./scripts/promote_channel.py \
            --channel "${{ github.event.inputs.channel }}" \
            --api-tag "${{ github.event.inputs.api_tag }}" \
            --web-tag "${{ github.event.inputs.web_tag }}"

      - name: Create promotion pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/promote-${{ github.event.inputs.channel }}-${{ github.event.inputs.api_tag }}-${{ github.event.inputs.web_tag }}
          commit-message: "chore: promote ${{ github.event.inputs.channel }} to ${{ github.event.inputs.api_tag }} / ${{ github.event.inputs.web_tag }}"
          title: "chore: promote ${{ github.event.inputs.channel }} to ${{ github.event.inputs.api_tag }} / ${{ github.event.inputs.web_tag }}"
          body: |
            ## Promotion

            - Channel: `${{ github.event.inputs.channel }}`
            - API tag: `${{ github.event.inputs.api_tag }}`
            - Web tag: `${{ github.event.inputs.web_tag }}`

            This PR was generated by the `Promote Channel` workflow and will be validated by the infra smoke tests before merge.
          delete-branch: true
